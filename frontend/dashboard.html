    // ── Calculator Page ───────────────────────────────────────────────────────
    const BP_FILTERS    = ['Personal', 'Corporate', 'Not Owned', 'Favorites', 'BPOs', 'BPCs'];
    const TYPE_FILTERS  = ['Ships', 'Modules', 'Charges', 'Drones', 'Rigs', 'Structures', 'Booster', 'Implants', 'Components', 'Other'];
    const TECH_FILTERS  = ['I', 'II', 'III'];
    const SIZE_FILTERS  = ['S', 'M', 'L', 'XL', 'U'];

    const FACILITY_OPTIONS = [
      { value: 'station', label: 'NPC Station' },
      { value: 'medium',  label: 'Medium Eng. Complex' },
      { value: 'large',   label: 'Large Eng. Complex' },
      { value: 'xl',      label: 'XL Eng. Complex' },
      { value: 'raitaru', label: 'Raitaru' },
      { value: 'azbel',   label: 'Azbel' },
      { value: 'sotiyo',  label: 'Sotiyo' },
    ];

    const MARKET_HUBS = ['jita', 'amarr', 'dodixie', 'rens', 'hek'];

    // Sortable column definitions: [key, label, accessor fn]
    const CALC_COLS = [
      { key: 'name',            label: 'ITEM',     get: r => r.name,                      align: 'left'  },
      { key: 'tech',            label: 'TECH',     get: r => r.tech || '',                align: 'right' },
      { key: 'category',        label: 'CAT',      get: r => r.category || '',            align: 'right' },
      { key: 'me_level',        label: 'ME',       get: r => r.me_level ?? 0,             align: 'right' },
      { key: 'te_level',        label: 'TE',       get: r => r.te_level ?? 0,             align: 'right' },
      { key: 'duration',        label: 'DURATION', get: r => r.duration || 0,             align: 'right' },
      { key: 'avg_daily_volume',label: 'DEMAND',   get: r => r.avg_daily_volume || 0,     align: 'right' },
      { key: 'qty',             label: 'QTY',      get: r => r.output_qty || 1,           align: 'right', noSort: true },
      { key: 'runs',            label: 'RUNS',     get: r => 1,                           align: 'right', noSort: true },
      { key: 'cost',            label: 'COST',     get: r => (r.material_cost||0)+(r.job_cost||0), align: 'right' },
      { key: 'gross_revenue',   label: 'REVENUE',  get: r => r.gross_revenue || 0,        align: 'right' },
      { key: 'tax',             label: 'TAX',      get: r => (r.sales_tax||0)+(r.broker_fee||0), align: 'right' },
      { key: 'net_profit',      label: 'PROFIT',   get: r => r.net_profit || 0,           align: 'right' },
      { key: 'roi',             label: 'ROI',      get: r => r.roi || 0,                  align: 'right' },
      { key: 'isk_per_hour',    label: 'ISK/HR',   get: r => r.isk_per_hour || 0,         align: 'right' },
      { key: 'isk_per_m3',      label: 'ISK/M³',   get: r => r.isk_per_m3 || 0,           align: 'right' },
    ];

    function CalculatorPage() {
      // Filter state — all checked by default
      const [bpFilters, setBpFilters]     = useState(new Set(BP_FILTERS));
      const [typeFilters, setTypeFilters] = useState(new Set(TYPE_FILTERS));
      const [techFilters, setTechFilters] = useState(new Set(TECH_FILTERS));
      const [sizeFilters, setSizeFilters] = useState(new Set(SIZE_FILTERS));

      // Input state
      const [system, setSystem]         = useState('Korsiki');
      const [facility, setFacility]     = useState('large');
      const [buyLoc, setBuyLoc]         = useState('jita');
      const [sellLoc, setSellLoc]       = useState('jita');
      const [minVolume, setMinVolume]   = useState('');
      const [search, setSearch]         = useState('');

      // Sort state
      const [sortKey, setSortKey]   = useState('net_profit');
      const [sortDir, setSortDir]   = useState(-1);  // -1 = desc, 1 = asc

      // Per-row overrides: { [outputId]: { qty, runs } }
      const [overrides, setOverrides] = useState({});

      // Expanded row
      const [selectedIdx, setSelectedIdx] = useState(null);

      // Show ESI BP library panel
      const [showEsiBps, setShowEsiBps] = useState(false);

      // Shopping list: set of output_ids checked for the list
      const [checkedIds, setCheckedIds] = useState(new Set());
      function toggleCheck(id, e) {
        e.stopPropagation();
        setCheckedIds(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      }

      // Build API URL with params — re-fetch when system or facility changes
      const calcUrl = useRef('');
      const [calcKey, setCalcKey] = useState(0);
      const [pendingFetch, setPendingFetch] = useState(false);

      function buildUrl() {
        const params = new URLSearchParams({
          system:   system,
          facility: facility,
          sell_loc: sellLoc,
          buy_loc:  buyLoc,
        });
        return `${API}/api/calculator?${params}`;
      }

      const { data: calcData, loading, error } = useApi(buildUrl(), [calcKey]);

      // Skills from ESI
      const { data: skillsData } = useApi(`${API}/api/skills`, []);
      const charSkills = skillsData?.skills || null;

      function handleApply() {
        setCalcKey(k => k + 1);
        setSelectedIdx(null);
      }

      function handleSort(key) {
        if (sortKey === key) {
          setSortDir(d => d * -1);
        } else {
          setSortKey(key);
          setSortDir(-1);
        }
      }

      const baseResults = (calcData?.results || []).filter(r => {
        if (search && !r.name.toLowerCase().includes(search.toLowerCase())) return false;
        if (!techFilters.has(r.tech || 'I')) return false;
        if (!sizeFilters.has(r.size || 'U')) return false;
        if (!typeFilters.has(r.category || 'Other')) return false;
        const bpKey = r.bp_type === 'BPC' ? 'BPCs' : 'BPOs';
        if (!bpFilters.has(bpKey)) return false;
        if (minVolume) {
          const mv = parseFloat(minVolume);
          if (!isNaN(mv) && (r.avg_daily_volume || 0) < mv) return false;
        }
        return true;
      });

      // Apply sort
      const col = CALC_COLS.find(c => c.key === sortKey);
      const results = [...baseResults].sort((a, b) => {
        const av = col ? col.get(a) : 0;
        const bv = col ? col.get(b) : 0;
        if (typeof av === 'string') return sortDir * av.localeCompare(bv);
        return sortDir * ((av || 0) - (bv || 0));
      });

      // Derived from results — must come AFTER results is defined
      const checkedItems = results.filter(r => checkedIds.has(r.output_id));

      function getOverride(id, field, fallback) {
        return overrides[id]?.[field] ?? fallback;
      }
      function setOverride(id, field, val) {
        setOverrides(prev => ({
          ...prev,
          [id]: { ...(prev[id] || {}), [field]: val }
        }));
      }

      const sciInfo = calcData?.sci != null
        ? `SCI ${(calcData.sci * 100).toFixed(2)}% · ${calcData?.facility?.label || ''}`
        : null;

      return (
        <div className="calc-page">
          {/* ── Fixed top: filters + search ─────────────── */}
          <div className="calc-top">
          <div className="calc-filters">
            {/* ── Row 1: inputs ───────────────────────────── */}
            <div className="calc-filters-inputs">
              {/* System — autocomplete */}
              <div className="filter-group">
                <span className="filter-label">SYS</span>
                <SystemInput value={system} onChange={setSystem} />
              </div>
              {/* Facility — select */}
              <div className="filter-group">
                <span className="filter-label">FAC</span>
                <select
                  className="calc-input"
                  value={facility}
                  onChange={e => setFacility(e.target.value)}
                  style={{ width: 160 }}
                >
                  {FACILITY_OPTIONS.map(o => (
                    <option key={o.value} value={o.value}>{o.label}</option>
                  ))}
                </select>
              </div>
              {/* Buy location */}
              <div className="filter-group">
                <span className="filter-label">BUY</span>
                <select className="calc-input" value={buyLoc} onChange={e => setBuyLoc(e.target.value)}>
                  {MARKET_HUBS.map(h => <option key={h} value={h}>{h.charAt(0).toUpperCase()+h.slice(1)}</option>)}
                </select>
              </div>
              {/* Sell location */}
              <div className="filter-group">
                <span className="filter-label">SELL</span>
                <select className="calc-input" value={sellLoc} onChange={e => setSellLoc(e.target.value)}>
                  {MARKET_HUBS.map(h => <option key={h} value={h}>{h.charAt(0).toUpperCase()+h.slice(1)}</option>)}
                </select>
              </div>
              {/* Min volume */}
              <div className="filter-group">
                <span className="filter-label">VOL</span>
                <input className="calc-input" type="number" value={minVolume}
                  onChange={e => setMinVolume(e.target.value)} placeholder="0" style={{ width:80 }} />
              </div>
              {/* Apply button */}
              <div className="filter-group" style={{ justifyContent:'flex-end', borderRight:'none', marginLeft:'auto' }}>
                <span className="filter-label" style={{ visibility:'hidden' }}>–</span>
                <button className="btn btn-primary" onClick={handleApply} style={{ padding:'3px 14px', fontSize:11 }}>
                  ⟳ RECALC
                </button>
              </div>
              {/* ESI BPs toggle */}
              <div className="filter-group" style={{ justifyContent:'flex-end', borderRight:'none' }}>
                <span className="filter-label" style={{ visibility:'hidden' }}>–</span>
                <button
                  className={`btn${showEsiBps ? ' btn-primary' : ''}`}
                  onClick={() => setShowEsiBps(v => !v)}
                  style={{ padding:'3px 14px', fontSize:11 }}
                >
                  ESI BPs
                </button>
              </div>
            </div>
            {/* ── Row 2: chip filters ──────────────────────── */}
            <div className="calc-filters-chips">
              {[
                ['BPs',  BP_FILTERS,   bpFilters,   setBpFilters],
                ['Type', TYPE_FILTERS, typeFilters, setTypeFilters],
                ['Tech', TECH_FILTERS, techFilters, setTechFilters],
                ['Size', SIZE_FILTERS, sizeFilters, setSizeFilters],
              ].map(([label, opts, active, setActive]) => {
                const allOn = opts.every(f => active.has(f));
                function toggleLabel() {
                  setActive(allOn ? new Set() : new Set(opts));
                }
                return (
                  <div key={label} className="filter-group">
                    <span
                      className={`filter-label${allOn ? ' all-active' : ''}`}
                      onClick={toggleLabel}
                      title={allOn ? `Deselect all ${label}` : `Select all ${label}`}
                    >{label}</span>
                    <div className="filter-options">
                      {opts.map(f => (
                        <button key={f} className={`chip${active.has(f) ? ' active' : ''}`}
                          onClick={() => setActive(s => toggleSet(s, f))}>{f}</button>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── ESI Blueprint Library (collapsible) ─────── */}
          {showEsiBps && <EsiBlueprintPanel />}

          {/* ── Search bar ────────────────────────────────── */}
          <div className="calc-search-bar">
            <span style={{ color:'var(--dim)', fontSize:11, letterSpacing:2 }}>SEARCH</span>
            <input
              className="calc-search-input"
              placeholder="Search items..."
              value={search}
              onChange={e => setSearch(e.target.value)}
            />
            <span style={{ color:'var(--dim)', fontSize:10, letterSpacing:1 }}>
              {results.length} ITEM{results.length !== 1 ? 'S' : ''}
            </span>
            {sciInfo && (
              <span style={{ color:'var(--dim)', fontSize:10, letterSpacing:1, marginLeft:'auto' }}>
                {sciInfo}
              </span>
            )}
            {charSkills && (
              <span style={{ color:'#00cc66', fontSize:10, letterSpacing:1 }}>
                ● SKILLS LOADED
              </span>
            )}
          </div>
          </div>{/* end .calc-top */}

          {/* ── Scrollable item table ─────────────────────── */}
          <div className="calc-body">
            <table className="calc-table">
              <thead>
                <tr>
                  <th className="check-cell" title="Add to Shopping List">✓</th>
                  {CALC_COLS.map(col => (
                    <th
                      key={col.key}
                      style={{ textAlign: col.align, cursor: col.noSort ? 'default' : 'pointer', userSelect:'none' }}
                      onClick={() => !col.noSort && handleSort(col.key)}
                    >
                      {col.label}
                      {!col.noSort && sortKey === col.key && (
                        <span className="sort-arrow">{sortDir === -1 ? '▼' : '▲'}</span>
                      )}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {loading ? (
                  <>
                    <SkeletonRows cols={17} count={6} />
                    <tr>
                      <td colSpan={17} style={{ textAlign:'center', padding:'10px', fontSize:10, color:'var(--dim)', letterSpacing:2, borderBottom:'none', animation:'pulse 1.5s ease-in-out infinite' }}>
                        FETCHING JITA PRICES — MAY TAKE ~60s ON FIRST LOAD
                      </td>
                    </tr>
                  </>
                ) : (
                  results.map((r, i) => {
                    const isSel    = selectedIdx === i;
                    const isChk    = checkedIds.has(r.output_id);
                    const qty      = getOverride(r.output_id, 'qty', r.output_qty);
                    const runs     = getOverride(r.output_id, 'runs', 1);
                    const totalTax = (r.sales_tax || 0) + (r.broker_fee || 0);
                    const roi      = r.roi || 0;
                    const tier     = roi >= 20 ? 'tier-great'
                                   : roi >= 12 ? 'tier-good'
                                   : roi >= 6  ? 'tier-ok'
                                   : roi >= 0  ? 'tier-poor'
                                   :             'tier-bad';
                    return (
                      <React.Fragment key={r.output_id ?? i}>
                        <tr
                          className={`${tier} row-profitable${isSel ? ' row-selected' : ''}`}
                          onClick={() => setSelectedIdx(p => p === i ? null : i)}
                        >
                          <td className="check-cell" onClick={e => toggleCheck(r.output_id, e)}>
                            <input
                              className="row-check"
                              type="checkbox"
                              checked={isChk}
                              onChange={() => {}}
                              onClick={e => toggleCheck(r.output_id, e)}
                            />
                          </td>
                          <td style={{ fontFamily:'var(--head)', fontSize:13, letterSpacing:1, textAlign:'left' }}>{r.name}</td>
                          <td style={{ color:'var(--dim)' }}>{r.tech || '—'}</td>
                          <td style={{ color:'var(--dim)', fontSize:10 }}>{r.category || '—'}</td>
                          <td>{r.me_level ?? '—'}</td>
                          <td>{r.te_level ?? '—'}</td>
                          <td style={{ color:'var(--dim)' }}>{fmtDuration(r.duration)}</td>
                          <td style={{ color:'var(--dim)' }}>{fmtVol(r.avg_daily_volume)}</td>
                          <td onClick={e => e.stopPropagation()}>
                            <input className="inline-num" type="number" min="1"
                              value={qty} onChange={e => setOverride(r.output_id, 'qty', parseInt(e.target.value) || 1)} />
                          </td>
                          <td onClick={e => e.stopPropagation()}>
                            <input className="inline-num" type="number" min="1"
                              value={runs} onChange={e => setOverride(r.output_id, 'runs', parseInt(e.target.value) || 1)} />
                          </td>
                          <td style={{ color:'var(--dim)' }}>{fmtISK((r.material_cost + r.job_cost) * runs)}</td>
                          <td>{fmtISK(r.gross_revenue * runs)}</td>
                          <td style={{ color:'var(--dim)' }}>{fmtISK(totalTax * runs)}</td>
                          <td className="profit-val">{fmtISK(r.net_profit * runs)}</td>
                          <td className="profit-val">{roi.toFixed(1)}%</td>
                          <td>{fmtISK(r.isk_per_hour)}</td>
                          <td>{r.isk_per_m3 ? fmtISK(r.isk_per_m3) : '—'}</td>
                        </tr>
                        {isSel && <CalcDetailPanel item={r} charSkills={charSkills} />}
                      </React.Fragment>
                    );
                  })
                )}
              </tbody>
            </table>
            {!loading && error && (
              <div style={{ padding:'32px 20px', color:'var(--accent)', textAlign:'center', letterSpacing:2, fontSize:11 }}>
                COULD NOT REACH SERVER — Is <code style={{ color:'var(--text)' }}>python server.py</code> running?
                <div style={{ marginTop:12 }}>
                  <button className="btn" onClick={handleApply} style={{ fontSize:11 }}>⟳ RETRY</button>
                </div>
              </div>
            )}
            {!loading && !error && results.length === 0 && calcData && (
              <div style={{ padding:'32px 20px', color:'var(--dim)', textAlign:'center', letterSpacing:2, fontSize:11 }}>
                NO ITEMS MATCH CURRENT FILTERS
              </div>
            )}
            {loading && !calcData && (
              <div style={{ padding:'32px 20px', color:'var(--dim)', textAlign:'center', letterSpacing:2, fontSize:11, animation:'pulse 1.5s ease-in-out infinite' }}>
                FETCHING MARKET DATA — This takes ~60s on first load…
              </div>
            )}
          </div>{/* end .calc-body */}

          {/* ── Shopping List ─────────────────────────────── */}
          <ShoppingList
            checkedItems={checkedItems}
            overrides={overrides}
            calcData={calcData}
          />

        </div>
      );
    }

    // ── Shopping List component ───────────────────────────────────────────────
    function ShoppingList({ checkedItems, overrides, calcData }) {
      const [collapsed, setCollapsed] = useState(false);
      const [copyMode, setCopyMode]   = useState('delta'); // 'required' | 'delta'
      const [copied, setCopied]       = useState(false);

      // Fetch assets once (cached 5 min on server)
      const { data: assetsData } = useApi(`${API}/api/assets`, []);
      const warehouse  = assetsData?.assets || {};   // { "type_id": qty }
      const assetNames = assetsData?.names  || {};   // { "type_id": name }

      // Also fetch ESI blueprints for the "do you have the BP?" check
      const { data: esiBpData } = useApi(`${API}/api/blueprints/esi`, []);
      const esiBpIds = new Set((esiBpData?.blueprints || []).map(b => b.type_id));

      // ── Aggregate mats across all checked items ───────────────────────────
      const matMap = {};  // type_id -> { name, required, unit_price }

      for (const item of checkedItems) {
        const runs = overrides[item.output_id]?.runs ?? 1;
        const mats = item.material_breakdown || [];
        for (const m of mats) {
          const tid = String(m.type_id);
          if (!matMap[tid]) {
            matMap[tid] = {
              type_id:    m.type_id,
              name:       m.name || assetNames[tid] || `Type ${m.type_id}`,
              required:   0,
              unit_price: m.unit_price || 0,
            };
          }
          matMap[tid].required += (m.quantity || 0) * runs;
        }

        // Blueprint check: if character doesn't have the blueprint, add it
        // blueprint type_id = output_id (simplification — SDE BPs are output+1 usually,
        // but we check by output_id presence in ESI bp list)
        const hasBp = esiBpIds.has(item.output_id);
        if (!hasBp && esiBpData) {
          const bpKey = `bp_${item.output_id}`;
          if (!matMap[bpKey]) {
            matMap[bpKey] = {
              type_id:    null,
              name:       `${item.name} Blueprint`,
              required:   runs,
              unit_price: 0,
              is_blueprint: true,
              missing_bp: true,
            };
          } else {
            matMap[bpKey].required += runs;
          }
        }
      }

      const matRows = Object.values(matMap).sort((a, b) => {
        // Blueprints at top, then alphabetical
        if (a.missing_bp && !b.missing_bp) return -1;
        if (!a.missing_bp && b.missing_bp) return 1;
        return a.name.localeCompare(b.name);
      });

      // ── Compute delta (required - warehouse) ─────────────────────────────
      function getWarehouse(tid) {
        if (!tid) return 0;
        return warehouse[String(tid)] || warehouse[tid] || 0;
      }

      // ── Build Eve multi-buy string ────────────────────────────────────────
      function buildCopyText(mode) {
        return matRows
          .filter(m => !m.missing_bp)
          .map(m => {
            const have  = getWarehouse(m.type_id);
            const delta = Math.max(0, m.required - have);
            const qty   = mode === 'delta' ? delta : m.required;
            if (qty <= 0) return null;
            return `${m.name} ${qty}`;
          })
          .filter(Boolean)
          .join('\n');
      }

      function handleCopy() {
        const text = buildCopyText(copyMode);
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }

      const totalRequired  = matRows.filter(m => !m.missing_bp).reduce((s, m) => s + m.required * m.unit_price, 0);
      const totalDeltaCost = matRows.filter(m => !m.missing_bp).reduce((s, m) => {
        const delta = Math.max(0, m.required - getWarehouse(m.type_id));
        return s + delta * m.unit_price;
      }, 0);
      const hasWarehouse = Object.keys(warehouse).length > 0;

      return (
        <div className={`calc-bottom${collapsed ? ' calc-bottom-collapsed' : ''}`}>
          {/* Header / toggle */}
          <div className="shopping-hdr" onClick={() => setCollapsed(v => !v)}>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <span style={{ fontFamily:'var(--head)', fontSize:11, letterSpacing:3, color:'var(--text)' }}>
                ◈ SHOPPING LIST
              </span>
              {checkedItems.length > 0 && (
                <span style={{ fontSize:10, color:'var(--accent)', letterSpacing:1 }}>
                  {checkedItems.length} ITEM{checkedItems.length !== 1 ? 'S' : ''} CHECKED
                </span>
              )}
              {checkedItems.length === 0 && (
                <span style={{ fontSize:10, color:'var(--dim)', letterSpacing:1 }}>
                  CHECK ROWS ABOVE TO BUILD A SHOPPING LIST
                </span>
              )}
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:16 }}>
              {!collapsed && checkedItems.length > 0 && (
                <>
                  <span style={{ fontSize:10, color:'var(--dim)', letterSpacing:1 }}>
                    TOTAL REQUIRED: <span style={{ color:'var(--text)' }}>{fmtISK(totalRequired)} ISK</span>
                  </span>
                  {hasWarehouse && (
                    <span style={{ fontSize:10, color:'var(--dim)', letterSpacing:1 }}>
                      STILL TO BUY: <span style={{ color:'var(--accent)' }}>{fmtISK(totalDeltaCost)} ISK</span>
                    </span>
                  )}
                </>
              )}
              <span style={{ fontSize:11, color:'var(--dim)' }}>{collapsed ? '▲' : '▼'}</span>
            </div>
          </div>

          {!collapsed && checkedItems.length > 0 && (
            <>
              <div className="shopping-body">
                {/* Left: checked items */}
                <div className="shopping-items">
                  <div style={{ padding:'4px 12px 2px', fontSize:9, color:'var(--dim)', letterSpacing:2, textTransform:'uppercase' }}>Queued Items</div>
                  {checkedItems.map(item => {
                    const runs = overrides[item.output_id]?.runs ?? 1;
                    return (
                      <div key={item.output_id} className="shopping-item-row">
                        <span className="shopping-item-name">{item.name}</span>
                        <span className="shopping-item-runs">×{runs}</span>
                      </div>
                    );
                  })}
                </div>

                {/* Right: aggregated materials */}
                <div className="shopping-mats">
                  <table>
                    <thead>
                      <tr>
                        <th style={{ textAlign:'left' }}>MATERIAL</th>
                        <th>REQUIRED QTY</th>
                        <th>TOTAL M³</th>
                        <th>UNIT PRICE</th>
                        <th>VALUE</th>
                        <th>WAREHOUSE</th>
                        <th>DELTA QTY</th>
                        <th>DELTA COST</th>
                      </tr>
                    </thead>
                    <tbody>
                      {matRows.map((m, i) => {
                        const have      = getWarehouse(m.type_id);
                        const delta     = Math.max(0, m.required - have);
                        const deltaCost = delta * m.unit_price;
                        const value     = m.required * m.unit_price;
                        const isMissing = delta > 0;
                        return (
                          <tr key={i} style={{ opacity: m.missing_bp ? 0.7 : 1 }}>
                            <td style={{
                              textAlign:'left', fontFamily:'var(--head)', fontSize:12, letterSpacing:1,
                              color: m.missing_bp ? 'var(--accent)' : 'var(--text)'
                            }}>
                              {m.missing_bp && <span style={{ marginRight:6, color:'var(--accent)' }}>⚠</span>}
                              {m.name}
                            </td>
                            <td>{fmtVol(m.required)}</td>
                            <td style={{ color:'var(--dim)' }}>—</td>
                            <td style={{ color:'var(--dim)' }}>{m.unit_price > 0 ? fmtISK(m.unit_price) : '—'}</td>
                            <td>{value > 0 ? fmtISK(value) : '—'}</td>
                            <td style={{ color: have > 0 ? '#00cc66' : 'var(--dim)' }}>
                              {hasWarehouse ? fmtVol(have) : '—'}
                            </td>
                            <td style={{ color: isMissing ? 'var(--accent)' : '#00cc66' }}>
                              {hasWarehouse ? (delta > 0 ? fmtVol(delta) : '✓ Stocked') : fmtVol(m.required)}
                            </td>
                            <td style={{ color: isMissing ? 'var(--accent)' : 'var(--dim)' }}>
                              {hasWarehouse ? (deltaCost > 0 ? fmtISK(deltaCost) : '—') : fmtISK(value)}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Copy bar */}
              <div className="shopping-copy-bar">
                <span className="copy-label">COPY MODE</span>
                <button
                  className={`btn${copyMode === 'required' ? ' btn-primary' : ''}`}
                  style={{ fontSize:10, padding:'2px 10px' }}
                  onClick={() => setCopyMode('required')}
                >REQUIRED QTY</button>
                <button
                  className={`btn${copyMode === 'delta' ? ' btn-primary' : ''}`}
                  style={{ fontSize:10, padding:'2px 10px' }}
                  onClick={() => setCopyMode('delta')}
                >DELTA QTY</button>
                <button
                  className="btn btn-primary"
                  style={{ fontSize:10, padding:'2px 14px', marginLeft:8 }}
                  onClick={handleCopy}
                >
                  {copied ? '✓ COPIED' : '⎘ COPY FOR MULTI-BUY'}
                </button>
                <span style={{ fontSize:10, color:'var(--dim)', letterSpacing:1, marginLeft:'auto' }}>
                  Paste into EVE Online → Market → Multi-Buy
                </span>
              </div>
            </>
          )}

          {!collapsed && checkedItems.length === 0 && (
            <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', color:'var(--dim)', fontSize:11, letterSpacing:2 }}>
              CHECK ITEMS IN THE TABLE ABOVE TO BUILD A SHOPPING LIST
            </div>
          )}
        </div>
      );
    }

    // ── Overview Page (existing content) ──────────────────────────────────────
    function OverviewPage({ scanData, plexData, walletHistory, scanLoading, plexLoading, scanError, onRefresh, refreshing }) {
      return (
        <div>
          <KPIBar
            scanData={scanData} plexData={plexData}
            loading={scanLoading || plexLoading}
            onRefresh={onRefresh} refreshing={refreshing || scanLoading}
          />
          <OpportunitiesSection
            scanData={scanData} loading={scanLoading} error={scanError}
          />
          <div className="bottom-grid">
            <PlexSection plexData={plexData} walletHistory={walletHistory} loading={plexLoading} />
            <MineralsSection scanData={scanData} loading={scanLoading} />
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    const AUTO_REFRESH_MS = 5 * 60 * 1000;

    function App() {
      const [refreshKey, setRefreshKey] = useState(0);
      const [refreshing, setRefreshing] = useState(false);
      const [activeTab, setActiveTab]   = useState('OVERVIEW');
      const timerRef = useRef(null);

      const { data: scanData, loading: scanLoading, error: scanError, refetch } = useApi(`${API}/api/scan`,           [refreshKey]);
      const { data: plexData, loading: plexLoading                              } = useApi(`${API}/api/plex`,           [refreshKey]);
      const { data: walletRaw                                                   } = useApi(`${API}/api/wallet/history`, [refreshKey]);

      const walletHistory = Array.isArray(walletRaw) ? walletRaw : null;
      const online = !scanError;

      useEffect(() => {
        timerRef.current = setInterval(() => setRefreshKey(k => k + 1), AUTO_REFRESH_MS);
        return () => clearInterval(timerRef.current);
      }, []);

      async function handleRefresh() {
        setRefreshing(true);
        await refetch();
        setRefreshing(false);
      }

      return (
        <div className="app-shell">
          <Header online={online} activeTab={activeTab} onTabChange={setActiveTab} />
          <div className="app-content">
            {activeTab === 'OVERVIEW' && (
              <div className="overview-scroll">
                <OverviewPage
                  scanData={scanData} plexData={plexData} walletHistory={walletHistory}
                  scanLoading={scanLoading} plexLoading={plexLoading} scanError={scanError}
                  onRefresh={handleRefresh} refreshing={refreshing}
                />
              </div>
            )}
            {activeTab === 'CALCULATOR' && (
              <CalculatorPage />
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
